# Server
server.port=8080

# MySQL local database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/upi_offline_mesh?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Idempotency window (how long a packet hash is remembered)
upi.mesh.idempotency-ttl-seconds=86400

# Packet freshness window — anything older than this is rejected as replay
upi.mesh.packet-max-age-seconds=86400
